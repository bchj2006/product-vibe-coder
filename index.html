<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로또 5세트 추천기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2250095943896209"
     crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141E30, #243B55);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 20px;
            width: 95%;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        .set {
            margin: 15px 0;
        }

        .ball {
            display: inline-block;
            width: 42px;
            height: 42px;
            line-height: 42px;
            margin: 5px;
            border-radius: 50%;
            font-weight: bold;
            background: #ffcc00;
            color: black;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #ff4b2b;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff1e00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 로또 번호 5세트 추천기</h1>
    <div id="results">버튼을 눌러 번호를 생성하세요</div>
    <button onclick="generateSets()">5세트 생성하기</button>
</div>

<script>
    function generateOneSet() {
        let numbers = [];

        while (numbers.length < 6) {
            let num = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        return numbers.sort((a, b) => a - b);
    }

    function generateSets() {
        let output = "";

        for (let i = 1; i <= 5; i++) {
            let set = generateOneSet();
            output += `<div class="set"><strong>${i}세트 :</strong> `;
            
            set.forEach(n => {
                output += `<span class="ball">${n}</span>`;
            });

            output += `</div>`;
        }

        document.getElementById("results").innerHTML = output;
    }
</script>

</body>
</html>
